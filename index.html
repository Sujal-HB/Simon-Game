<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simon Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header">
      <div class="spacer"></div>
      <h1 class="tex1">Simon Game</h1>
      <h4 class="highestScore">Highest Score:</h4>
    </div>

    <h3 class="tex2">press any key to start the game</h3>

    <div class="container">
      <div>
        <div class="btn one" type="button" id="one"></div>
        <div class="btn two" type="button" id="two"></div>
      </div>
      <div>
        <div class="btn three" type="button" id="three"></div>
        <div class="btn four" type="button" id="four"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
